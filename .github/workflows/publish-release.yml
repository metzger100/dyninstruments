name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout repository at tag ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Set up npm
        shell: bash
        run: |
          set -euo pipefail
          npm install --global npm@12.0.1
          test "$(npm --version)" = "12.0.1"

      - name: Install locked quality tooling
        run: npm run setup

      - name: Run complete quality gate
        run: npm run check:all

  publish-release:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository at tag ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Validate release tag
        id: release_version
        run: node tools/release-version.mjs --github-output "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify release artifacts
        id: release_assets
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release_version.outputs.version }}"
          zip_path="releases/dyninstruments-${version}.zip"
          notes_path="releases/dyninstruments-${version}.md"

          if [[ ! -f "$zip_path" || ! -f "$notes_path" ]]; then
            echo "Release artifacts not found. Run \`npm run release:create\` locally first."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "notes_path=$notes_path" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ github.ref_name }}
          name: dyninstruments v${{ steps.release_assets.outputs.version }}
          body_path: ${{ steps.release_assets.outputs.notes_path }}
          files: ${{ steps.release_assets.outputs.zip_path }}
          prerelease: ${{ steps.release_version.outputs.prerelease }}
